<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VoxDesk — Local AI desktop assistant with screen analysis">
    <title>VoxDesk — AI Assistant</title>
    <style>
        /* Sistem fontlarını kullan — dışarıya bağlanma (izolasyon) */
        :root { --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="app-container" id="app">
        <!-- Header -->
        <header class="app-header" id="header">
            <div class="header-left">
                <div class="logo-pulse" id="statusIndicator">
                    <div class="pulse-ring"></div>
                    <div class="pulse-core"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg></div>
                </div>
                <div class="header-title">
                    <h1>VoxDesk</h1>
                    <span class="header-subtitle" id="statusText">Başlatılıyor...</span>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="btnVoiceMode" title="Sesli Sohbet Modu">
                    <span class="btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg></span>
                </button>
                <button class="header-btn" id="btnSettings" title="Ayarlar">
                    <span class="btn-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg></span>
                </button>
                <div class="isolation-badge" id="isolationBadge" title="İzolasyon Durumu">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg> Lokal
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <!-- Live Screen Preview -->
                <div class="glass-panel screen-preview">
                    <div class="panel-header">
                        <span class="panel-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></span>
                        <span>Canlı Ekran</span>
                        <div class="live-dot" id="captureDot"></div>
                    </div>
                    <div class="preview-container" id="screenPreview">
                        <div class="preview-placeholder">
                            <span>Ekran yakalama<br>başlatılıyor...</span>
                        </div>
                        <img id="previewImage" class="preview-image" alt="Screen" style="display:none">
                    </div>
                </div>

                <!-- Quick Settings -->
                <div class="glass-panel settings-panel" id="settingsPanel">
                    <div class="panel-header">
                        <span class="panel-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg></span>
                        <span>Ayarlar</span>
                    </div>

                    <div class="setting-group">
                        <label>Model</label>
                        <select id="modelSelect" class="glass-select">
                            <option value="InternVL3-14B-Instruct">InternVL3-14B</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>Ses Profili</label>
                        <select id="voiceSelect" class="glass-select">
                            <option value="af_heart">af_heart</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>Ses Hızı</label>
                        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" class="glass-range">
                        <span id="speedValue" class="range-value">1.0x</span>
                    </div>

                    <div class="setting-group">
                        <label>TTS</label>
                        <div class="toggle-container">
                            <input type="checkbox" id="ttsToggle" class="toggle-input" checked>
                            <label for="ttsToggle" class="toggle-label"></label>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>Voice Activation</label>
                        <div class="toggle-container">
                            <input type="checkbox" id="vaToggle" class="toggle-input">
                            <label for="vaToggle" class="toggle-label"></label>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>Ekran Capture</label>
                        <div class="toggle-container">
                            <input type="checkbox" id="alwaysOnToggle" class="toggle-input" checked>
                            <label for="alwaysOnToggle" class="toggle-label"></label>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>Kişilik</label>
                        <select id="personalitySelect" class="glass-select">
                            <option value="voxly">Voxly</option>
                        </select>
                    </div>

                    <div class="setting-actions">
                        <button class="glass-btn btn-sm" id="btnExportHistory"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg> Kaydet</button>
                        <button class="glass-btn btn-sm btn-danger" id="btnClearHistory"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg> Temizle</button>
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area">
                <div class="chat-messages" id="chatMessages">
                    <!-- Greeting message -->
                    <div class="message message-assistant" id="greetingMsg">
                        <div class="message-avatar"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="8" width="18" height="12" rx="3"/><circle cx="9" cy="14" r="1.5" fill="currentColor"/><circle cx="15" cy="14" r="1.5" fill="currentColor"/><path d="M9 4h6"/><line x1="12" y1="4" x2="12" y2="8"/></svg></div>
                        <div class="message-bubble">
                            <div class="message-content" id="greetingText">Hello! Voxly is online and ready to assist.</div>
                            <div class="message-meta">
                                <span class="message-time" id="greetingTime"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Voice Mode Indicator -->
                <div class="voice-indicator" id="voiceIndicator" style="display:none">
                    <div class="voice-waves">
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                    </div>
                    <span class="voice-status" id="voiceStatus">Dinliyorum...</span>
                </div>

                <!-- Input Area -->
                <div class="chat-input-area" id="chatInputArea">
                    <div class="drop-overlay" id="dropOverlay">Görüntüyü bırak</div>
                    <div class="input-container glass-panel">
                        <!-- Attachment strip (only visible when attachments exist) -->
                        <div class="attachment-strip" id="attachmentStrip"></div>
                        <!-- Pin indicator (only visible when screen is pinned) -->
                        <div class="pin-indicator" id="pinIndicator">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2l1.5 9h3L12 22l-4.5-11h3z"/></svg>
                            <span>Ekran pinlendi — mesajınızla gönderilecek</span>
                        </div>
                        <!-- Main input row: textarea + buttons -->
                        <div class="input-row">
                            <textarea
                                id="chatInput"
                                class="chat-input"
                                placeholder="Mesajını yaz... (Ctrl+Enter gönder)"
                                rows="1"
                            ></textarea>
                            <div class="input-actions">
                                <button class="input-btn" id="btnUpload" title="Görüntü yükle">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                                </button>
                                <input type="file" id="fileInput" accept="image/*" multiple hidden>
                                <button class="input-btn" id="btnMic" title="Sesli mesaj (Ctrl+Shift+B basılı tut)">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="2" width="6" height="12" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                                </button>
                                <button class="input-btn btn-send" id="btnSend" title="Gönder (Ctrl+Enter)">
                                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="input-hints">
                        <span>Ctrl+Enter: Gönder</span>
                        <span>Ctrl+Shift+S: Ekranı Pinle</span>
                        <span>Ctrl+Shift+B: Bas-Konuş</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <!-- Sprint 3: DEV HUD (Ctrl+Shift+D) -->
    <div id="devHud" class="dev-hud" style="display:none;"></div>

    <!-- Image lightbox -->
    <div class="lightbox" id="lightbox">
        <img id="lightboxImg" src="" alt="Preview">
    </div>

    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/screen-preview.js"></script>
    <script src="/static/js/audio-capture.js"></script>
    <script src="/static/js/dev-hud.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
