<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="VoxDesk — Local AI desktop assistant with screen analysis">
    <title>VoxDesk — AI Assistant</title>
    <style>
        /* Sistem fontlarını kullan — dışarıya bağlanma (izolasyon) */
        :root { --font-main: 'Segoe UI', system-ui, -apple-system, sans-serif; }
    </style>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div class="app-container" id="app">
        <!-- Header -->
        <header class="app-header" id="header">
            <div class="header-left">
                <div class="logo-pulse" id="statusIndicator">
                    <div class="pulse-ring"></div>
                    <div class="pulse-core">🌐</div>
                </div>
                <div class="header-title">
                    <h1>VoxDesk</h1>
                    <span class="header-subtitle" id="statusText">Başlatılıyor...</span>
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn" id="btnVoiceMode" title="Sesli Sohbet Modu">
                    <span class="btn-icon">🎤</span>
                </button>
                <button class="header-btn" id="btnSettings" title="Ayarlar">
                    <span class="btn-icon">⚙️</span>
                </button>
                <div class="isolation-badge" id="isolationBadge" title="İzolasyon Durumu">
                    🔒 Lokal
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Sidebar -->
            <aside class="sidebar" id="sidebar">
                <!-- Live Screen Preview -->
                <div class="glass-panel screen-preview">
                    <div class="panel-header">
                        <span class="panel-icon">🖥️</span>
                        <span>Canlı Ekran</span>
                        <div class="live-dot" id="captureDot"></div>
                    </div>
                    <div class="preview-container" id="screenPreview">
                        <div class="preview-placeholder">
                            <span>Ekran yakalama<br>başlatılıyor...</span>
                        </div>
                        <img id="previewImage" class="preview-image" alt="Screen" style="display:none">
                    </div>
                </div>

                <!-- Quick Settings -->
                <div class="glass-panel settings-panel" id="settingsPanel">
                    <div class="panel-header">
                        <span class="panel-icon">⚙️</span>
                        <span>Ayarlar</span>
                    </div>

                    <div class="setting-group">
                        <label>Model</label>
                        <select id="modelSelect" class="glass-select">
                            <option value="huihui-ai/minicpm-v4.5-abliterated">MiniCPM-V 4.5</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>Ses Profili</label>
                        <select id="voiceSelect" class="glass-select">
                            <option value="af_heart">❤️ af_heart</option>
                        </select>
                    </div>

                    <div class="setting-group">
                        <label>Ses Hızı</label>
                        <input type="range" id="speedSlider" min="0.5" max="2.0" step="0.1" value="1.0" class="glass-range">
                        <span id="speedValue" class="range-value">1.0x</span>
                    </div>

                    <div class="setting-group">
                        <label>TTS</label>
                        <div class="toggle-container">
                            <input type="checkbox" id="ttsToggle" class="toggle-input" checked>
                            <label for="ttsToggle" class="toggle-label"></label>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>Voice Activation</label>
                        <div class="toggle-container">
                            <input type="checkbox" id="vaToggle" class="toggle-input">
                            <label for="vaToggle" class="toggle-label"></label>
                        </div>
                    </div>

                    <div class="setting-group">
                        <label>Kişilik</label>
                        <select id="personalitySelect" class="glass-select">
                            <option value="voxly">🤖 Voxly</option>
                        </select>
                    </div>

                    <div class="setting-actions">
                        <button class="glass-btn btn-sm" id="btnExportHistory">💾 Geçmişi Kaydet</button>
                        <button class="glass-btn btn-sm btn-danger" id="btnClearHistory">🗑️ Temizle</button>
                    </div>
                </div>
            </aside>

            <!-- Chat Area -->
            <main class="chat-area">
                <div class="chat-messages" id="chatMessages">
                    <!-- Greeting message -->
                    <div class="message message-assistant" id="greetingMsg">
                        <div class="message-avatar">🤖</div>
                        <div class="message-bubble">
                            <div class="message-content" id="greetingText">Hello! Voxly is online and ready to assist.</div>
                            <div class="message-meta">
                                <span class="message-time" id="greetingTime"></span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Voice Mode Indicator -->
                <div class="voice-indicator" id="voiceIndicator" style="display:none">
                    <div class="voice-waves">
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                    </div>
                    <span class="voice-status" id="voiceStatus">Dinliyorum...</span>
                </div>

                <!-- Input Area -->
                <div class="chat-input-area">
                    <div class="input-container glass-panel">
                        <textarea
                            id="chatInput"
                            class="chat-input"
                            placeholder="Mesajını yaz... (Ctrl+Enter gönder)"
                            rows="1"
                        ></textarea>
                        <div class="input-actions">
                            <button class="input-btn" id="btnScreenshot" title="Ekran görüntüsü ekle">
                                📸
                            </button>
                            <button class="input-btn" id="btnMic" title="Sesli mesaj (Ctrl+Shift+B basılı tut)">
                                🎤
                            </button>
                            <button class="input-btn btn-send" id="btnSend" title="Gönder (Ctrl+Enter)">
                                ➤
                            </button>
                        </div>
                    </div>
                    <div class="input-hints">
                        <span>Ctrl+Shift+Space: Aktive Et</span>
                        <span>Ctrl+Shift+V: Sürekli Dinle</span>
                        <span>Ctrl+Shift+B: Bas-Konuş</span>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="/static/js/websocket.js"></script>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/screen-preview.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
