# VoxDesk — Default Configuration
app:
  name: "VoxDesk"
  host: "127.0.0.1"
  port: 8765
  debug: false

capture:
  backend: "dxcam"           # dxcam — Windows DirectX screen capture
  interval_seconds: 1.0
  buffer_size: 30        # Last 30 frames (ring buffer)
  jpeg_quality: 85          # Legacy default (preview fallback)
  resize_width: 1280        # Legacy default (preview fallback)

  # Part 3: Preview path — screen websocket / frontend preview
  preview_resize_width: 1280
  preview_jpeg_quality: 85

  # Part 3: Inference path — LLM image input (matches upload 1920/Q92)
  inference_resize_width: 1920
  inference_jpeg_quality: 92

llm:
  provider: "local-llama-server"
  model_path: "models/gemma-4-E4B-uncensored/Gemma-4-E4B-Uncensored-HauhauCS-Aggressive-Q8_K_P.gguf"
  mmproj_path: "models/gemma-4-E4B-uncensored/mmproj-Gemma-4-E4B-Uncensored-HauhauCS-Aggressive-f16.gguf"
  fallback_model_path: "models/Qwen2.5-VL-7B/Qwen_Qwen2.5-VL-7B-Instruct-Q8_0.gguf"
  fallback_mmproj_path: "models/Qwen2.5-VL-7B/mmproj-Qwen_Qwen2.5-VL-7B-Instruct-f16.gguf"
  n_gpu_layers: -1            # -1 = full GPU offload
  n_ctx: 8192                 # 16GB VRAM budget
  chat_format: null           # null = auto-detect from model
  temperature: 0.4
  max_tokens: 512
  repeat_penalty: 1.15             # Prevent repetition loops (InternVL3 prone to this)
  context_messages: 10        # Send last N messages as context

# ── Local llama-server sidecar (Gemma4 vision via HTTP) ──────────
local_llama_server:
  enabled: true
  executable_path: ""  # REQUIRED — set to local llama-server.exe path before starting
  # Dev example:  "C:/Users/USER/.docker/bin/inference/llama-server.exe"
  # EXE packaging: bundled llama-server.exe next to VoxDesk.exe
  #   VoxDesk.exe
  #   llama-server.exe  (or bin/llama-server.exe)
  #   models/gemma-4-E4B-uncensored/*.gguf
  base_url: "http://127.0.0.1:8081"
  port: 8081
  model_path: "models/gemma-4-E4B-uncensored/Gemma-4-E4B-Uncensored-HauhauCS-Aggressive-Q8_K_P.gguf"
  mmproj_path: "models/gemma-4-E4B-uncensored/mmproj-Gemma-4-E4B-Uncensored-HauhauCS-Aggressive-f16.gguf"
  n_gpu_layers: 99
  n_ctx: 8192
  jinja: true
  auto_start: true
  startup_timeout_seconds: 120.0
  shutdown_timeout_seconds: 10.0
  temperature: 1.0            # Gemma4 recommended
  top_p: 0.95                 # Gemma4 recommended
  top_k: 64                   # Gemma4 recommended
  max_tokens: 512
  context_messages: 10

tts:
  engine: "kokoro"
  voice: "af_heart"
  speed: 1.0
  lang_code: "a"         # 'a'=American, 'b'=British
  enabled: true

stt:
  engine: "faster-whisper"
  model: "large-v3-turbo"
  model_path: "models/whisper-large-v3-turbo"   # CTranslate2 format — lokal, faster-whisper uyumlu
  device: "cuda"
  compute_type: "float16"
  language: null          # null = auto-detect TR/EN
  vad_enabled: true

translator:
  engine: "marian"
  model_path: "models/opus-mt-tr-en"
  device: "cuda"
  enabled: false          # LLM handles multilingual natively — translator dormant

voice_activation:
  enabled: false
  threshold_db: -30

hotkeys:
  activate: "ctrl+shift+space"
  toggle_listen: "ctrl+shift+v"
  push_to_talk: "ctrl+shift+b"
  pin_screen: "ctrl+shift+s"

personality: "voxly"      # Personality file under config/personalities/

history:
  max_messages: 500
  auto_save: false        # Enable manually if needed
  save_path: "./data/history/"

# Sprint 1 — Gap 5: Previously unmapped sections (now loaded by load_config)

features:
  enable_module_registry: true
  enable_vram_unload: true
  enable_binary_audio: false
  enable_audioworklet: false
  enable_mediarecorder_fallback: true
  enable_debug_metrics: false
  enable_debug_capture_export: false    # Part 1.5: image debug frame export
  enable_full_voice_mode: true          # Sprint 7: Full Voice Mode UI

network:
  bind_host: "127.0.0.1"
  allowed_ws_origins:
    - "http://127.0.0.1:*"
    - "http://localhost:*"

privacy:
  offline_mode: true
  allow_cloud_providers: false
  allow_runtime_model_downloads: false
  allow_external_telemetry: false
  allow_cdn_assets: false

model_loading:
  local_files_only: true
  fail_if_model_missing: true

security:
  max_ws_frame_bytes: 65536
  max_audio_queue_depth: 50
  max_json_message_bytes: 65536
  idle_disconnect_seconds: 300
  max_messages_per_second: 60

vram:
  monitor_interval_seconds: 30.0
  stt_idle_unload_seconds: 180.0         # 3 dk idle → offload
  tts_idle_unload_seconds: 180.0         # 3 dk idle → offload
  translator_idle_unload_seconds: 180.0  # 3 dk idle → offload
  min_loaded_seconds: 30.0
  unload_cooldown_seconds: 10.0
  keep_warm: false
